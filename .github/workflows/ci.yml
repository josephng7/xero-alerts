name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package manager guard
        run: pnpm run --if-present check:pm

      - name: Agents compliance guard
        run: pnpm run --if-present check:agents

      - name: Typecheck
        run: pnpm run --if-present typecheck

      - name: Lint
        run: pnpm run --if-present lint

      - name: Unit tests
        run: pnpm run --if-present test

      - name: Integration tests
        run: pnpm run --if-present test:integration

      - name: Build
        run: pnpm run --if-present build
